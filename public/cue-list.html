<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cue List</title>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #161618;
      --bg2: #1e1e21;
      --bg3: #272729;
      --border: #404044;
      --border2: #2c2c2f;
      --text: #e8e8e8;
      --text2: #a0a0a8;
      --text3: #60606a;
      --accent: #1a7fd4;
      --accent-h: #2490e8;
      --sel-bg: rgba(26, 127, 212, 0.2);
      --sel-bdr: rgba(26, 127, 212, 0.7);
    }

    body {
      font-family: 'Courier Prime', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 15px;
    }

    /* ── WS error banner ── */
    #ws-banner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #7a1010;
      border-bottom: 2px solid #c02020;
      color: #ffd0d0;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 8px 16px;
      text-transform: uppercase;
      flex-shrink: 0;
      animation: pulse-banner 1.4s ease-in-out infinite;
    }

    #ws-banner.show {
      display: flex;
    }

    @keyframes pulse-banner {

      0%,
      100% {
        background: #7a1010;
      }

      50% {
        background: #a01818;
      }
    }

    .ws-banner-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff6060;
      box-shadow: 0 0 6px #ff4040;
      flex-shrink: 0;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 13px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      height: 38px;
    }

    .header-left {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .header-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text);
    }

    .header-count {
      font-size: 11px;
      color: var(--text3);
    }

    .ws-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text3);
      display: inline-block;
      margin-left: 4px;
      transition: background 0.3s;
    }

    .ws-dot.connected {
      background: #3abf6a;
      box-shadow: 0 0 4px #3abf6a88;
    }

    .ws-dot.error {
      background: #e04040;
      box-shadow: 0 0 6px #e0404088;
    }

    .header-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 11px;
      font-family: inherit;
      padding: 3px 10px;
      border-radius: 3px;
      cursor: pointer;
    }

    .header-btn:hover {
      border-color: var(--text2);
      color: var(--text);
    }

    .btn-reset {
      background: none;
      border: 1px solid var(--border);
      color: var(--text3);
      font-size: 11px;
      font-family: inherit;
      padding: 3px 10px;
      border-radius: 3px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .btn-reset:hover {
      color: var(--text2);
      border-color: var(--text2);
    }

    /* ── Cue table pane ── */
    .pane-top {
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 80px;
    }

    .cue-table-wrap {
      flex: 1;
      overflow-y: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 5;
    }

    th {
      background: var(--bg2);
      color: var(--text3);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 5px 8px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      white-space: nowrap;
    }

    th.r {
      text-align: right;
    }

    td {
      padding: 5px 8px;
      border-bottom: 1px solid var(--border2);
      vertical-align: middle;
      white-space: nowrap;
    }

    tr.cue-row {
      cursor: pointer;
      transition: background 0.06s;
    }

    tr.cue-row:hover {
      background: var(--bg3);
    }

    tr.cue-row.selected {
      background: var(--sel-bg);
      outline: 1px solid var(--sel-bdr);
      outline-offset: -1px;
    }

    .cue-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 7px;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 700;
      min-width: 36px;
    }

    .cue-num.s {
      background: #183818;
      color: #7ae87a;
      border: 1px solid #2a6a2a;
    }

    .cue-num.l {
      background: #3a2c00;
      color: #f0c840;
      border: 1px solid #6a5000;
    }

    .cue-title-cell {
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .badge.vamp {
      background: rgba(110, 70, 200, 0.3);
      color: #c0a0ff;
      border: 1px solid rgba(110, 70, 200, 0.5);
    }

    .badge.once {
      background: rgba(40, 110, 40, 0.3);
      color: #80e080;
      border: 1px solid rgba(40, 110, 40, 0.5);
    }

    .badge.light {
      background: rgba(160, 120, 0, 0.3);
      color: #f0d060;
      border: 1px solid rgba(160, 120, 0, 0.5);
    }

    .len {
      color: var(--text2);
      text-align: right;
      font-size: 13px;
    }

    .col-num {
      width: 52px;
    }

    .col-type {
      width: 64px;
    }

    .col-len {
      width: 58px;
      text-align: right;
    }

    /* Played tick */
    tr.cue-row.played td:first-child::before {
      content: '✓';
      color: #4abf5a;
      font-size: 12px;
      margin-right: 4px;
    }

    tr.cue-row.played .cue-title-cell {
      color: var(--text3);
    }

    /* ── Resizer ── */
    .resizer {
      height: 6px;
      background: var(--border);
      cursor: ns-resize;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .resizer:hover,
    .resizer.dragging {
      background: var(--accent);
    }

    /* ── Bottom pane ── */
    .pane-bottom {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 80px;
    }

    /* Transport column */
    .transport {
      width: 30%;
      min-width: 130px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 8px;
      border-right: 1px solid var(--border);
      background: var(--bg2);
    }

    .master-vol-row {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex-shrink: 0;
    }

    .master-vol-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text2);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .master-vol-label span {
      color: var(--text);
      font-size: 12px;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 5px;
      background: var(--bg3);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      border: 1px solid var(--border);
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: #e0e0e8;
      cursor: pointer;
      border: 2px solid var(--border);
    }

    input[type=range]:active::-webkit-slider-thumb {
      background: #fff;
    }

    .transport-btns {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .btn-transport {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 5px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
      transition: filter 0.1s, transform 0.06s;
      min-height: 36px;
    }

    .btn-transport:active {
      filter: brightness(0.9);
    }

    .btn-go {
      background: #1e8c40;
      color: #ffffff;
      font-size: 18px;
      flex: 2;
      border: 1px solid #2ab856;
    }

    .btn-go:hover:not(:disabled) {
      filter: brightness(1.15);
    }

    .btn-go:disabled {
      background: #1a2a1a;
      color: #405040;
      border-color: #2a3a2a;
      cursor: default;
    }

    .btn-fade {
      background: #5a4200;
      color: #f0c040;
      border: 1px solid #8a6600;
    }

    .btn-fade:hover {
      filter: brightness(1.2);
    }

    .btn-stop {
      background: #7a1a1a;
      color: #ffa0a0;
      border: 1px solid #c03030;
    }

    .btn-stop:hover {
      filter: brightness(1.2);
    }

    /* Voices panel */
    .voices-panel {
      flex: 1; overflow-y: auto; padding: 5px 7px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .voices-header {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px;
      color: var(--text3); padding-bottom: 4px;
      border-bottom: 1px solid var(--border2); flex-shrink: 0;
    }

    /* ── Voice card ── */
    .vc { background: #181820; border: 1px solid #36363e; border-radius: 4px; overflow: hidden; transition: opacity 0.4s; }
    .vc.deramping { opacity: 0.45; }

    .vc-header {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 7px; background: #1e1e28;
    }
    .vc-name {
      flex: 1; min-width: 0; font-size: 12px; font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #d4d4e8;
    }
    .vc-badge {
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
      padding: 1px 5px; border-radius: 2px; flex-shrink: 0;
    }
    .vc-badge.vamp { background: rgba(110,70,200,0.3); color: #b898f8; }
    .vc-badge.once { background: rgba(40,110,40,0.3); color: #78d878; }
    .vc-time {
      font-family: 'Courier Prime', monospace; font-size: 11px;
      color: #7aaac0; flex-shrink: 0; letter-spacing: 0.5px;
    }

    .vc-wave-wrap {
      position: relative; height: 38px; background: #0e0e18; cursor: crosshair; user-select: none;
    }
    .vc-wave { width: 100%; height: 100%; display: block; }
    .vc-loop-region {
      position: absolute; top: 0; bottom: 0;
      background: rgba(140,90,255,0.2); pointer-events: none;
    }
    .vc-playhead {
      position: absolute; top: 0; bottom: 0; width: 2px;
      background: #ffffff; pointer-events: none;
      box-shadow: 0 0 4px rgba(255,255,255,0.5);
      transform: translateX(-1px);
    }
    .vc-fade-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to right, rgba(255,160,0,0.08), rgba(255,100,0,0.08));
      pointer-events: none; opacity: 0; transition: opacity 0.3s;
    }
    .vc.deramping .vc-fade-overlay { opacity: 1; }

    .vc-controls {
      display: flex; align-items: center; padding: 3px 5px; gap: 4px;
    }
    .btn-vc {
      padding: 2px 7px; border-radius: 3px; border: 1px solid #3c3c46;
      background: #22222e; color: #9898a8;
      font-size: 10px; font-family: inherit; cursor: pointer;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
      white-space: nowrap; flex-shrink: 0; line-height: 1.5;
    }
    .btn-vc:hover { color: #d8d8e8; border-color: #58586a; }
    .btn-vc.play  { background: #122018; color: #58d858; border-color: #285a28; }
    .btn-vc.play:hover  { background: #183022; }
    .btn-vc.pause { background: #101828; color: #5888d8; border-color: #284268; }
    .btn-vc.pause:hover { background: #141f38; }
    .btn-vc.dvmp  { color: #c8a8ff; border-color: rgba(140,90,255,0.6); }
    .btn-vc.dvmp:hover  { background: rgba(100,60,200,0.3); }
    .btn-vc.unvamp { color: #ffc060; border-color: rgba(200,140,0,0.6); }
    .btn-vc.unvamp:hover { background: rgba(160,100,0,0.3); }
    .btn-vc.fade  { color: #e0b020; border-color: rgba(140,100,0,0.55); }
    .btn-vc.fade:hover  { background: rgba(100,72,0,0.25); }
    .btn-vc.stop  { color: #e86060; border-color: rgba(160,38,38,0.55); }
    .btn-vc.stop:hover  { background: rgba(120,26,26,0.3); }

    .vc-vol-group {
      flex: 1; display: flex; align-items: center; gap: 4px;
      min-width: 0; margin-left: 2px;
    }
    .vc-vol-db { font-size: 10px; color: #606070; width: 34px; flex-shrink: 0; text-align: right; }
    input[type=range].vc-vol {
      flex: 1; min-width: 30px; height: 4px;
      /* Prevent layout recalc by containing width */
      max-width: 100%;
    }
    input[type=range].vc-vol::-webkit-slider-thumb { width: 11px; height: 11px; }

    .no-voices { color: var(--text3); font-size: 13px; font-style: italic; padding: 10px 0; }

    /* scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text3);
    }

    .empty-cues {
      padding: 24px;
      text-align: center;
      color: var(--text3);
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div id="ws-banner">
    <div class="ws-banner-dot"></div>
    WebSocket Disconnected — Reconnecting...
  </div>

  <div class="header">
    <div class="header-left">
      <span class="header-title">Cue List</span>
      <span class="header-count" id="cue-count">—</span>
      <span class="ws-dot" id="ws-dot" title="WebSocket status"></span>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn-reset" onclick="resetPlayed()" title="Clear all tick marks">Reset</button>
      <button class="header-btn" onclick="requestCues()">Refresh</button>
    </div>
  </div>

  <div class="pane-top" id="pane-top" style="height: 55vh;">
    <div class="cue-table-wrap">
      <table id="cue-table">
        <thead>
          <tr>
            <th class="col-num">#</th>
            <th>Title</th>
            <th class="col-type">Type</th>
            <th class="col-len r">Length</th>
          </tr>
        </thead>
        <tbody id="cue-tbody"></tbody>
      </table>
      <div class="empty-cues" id="empty-cues" style="display:none">No cues defined</div>
    </div>
  </div>

  <div class="resizer" id="resizer"></div>

  <div class="pane-bottom">
    <div class="transport">
      <div class="master-vol-row">
        <div class="master-vol-label">Master Vol <span id="master-db-label">+0.0 dB</span></div>
        <input type="range" id="master-vol" min="-40" max="6" step="0.5" value="0" oninput="onMasterVol(this.value)">
      </div>
      <div class="transport-btns">
        <button class="btn-transport btn-go" id="btn-go" onclick="goSelected()" disabled>GO</button>
        <button class="btn-transport btn-fade" onclick="fadeAll()">Fade All</button>
        <button class="btn-transport btn-stop" onclick="stopAll()">Stop All</button>
      </div>
    </div>

    <div class="voices-panel">
      <div class="voices-header">Active Voices</div>
      <div id="voices-list">
        <div class="no-voices">No active voices</div>
      </div>
    </div>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────
    let cuesData = [];
    let selectedIdx = -1;
    let ws = null;
    let activeInstances = [];
    let playedIds = new Set();

    // ── WebSocket ──────────────────────────────────────────────────────────────
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}`);
      const dot = document.getElementById('ws-dot');
      const banner = document.getElementById('ws-banner');

      ws.onopen = () => {
        dot.className = 'ws-dot connected';
        banner.classList.remove('show');
      };
      ws.onclose = () => {
        dot.className = 'ws-dot error';
        banner.classList.add('show');
        setTimeout(connectWS, 2000);
      };
      ws.onerror = () => {
        dot.className = 'ws-dot error';
        banner.classList.add('show');
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'instances') {
          activeInstances = msg.list || [];
          updateVoices();
        } else if (msg.type === 'playedCues') {
          playedIds = new Set(msg.ids || []);
          applyPlayedTicks();
        } else if (msg.type === 'masterVolume') {
          const slider = document.getElementById('master-vol');
          if (slider && !slider.matches(':active')) {
            const db = msg.db ?? 0;
            slider.value = Math.max(-40, Math.min(6, db));
            document.getElementById('master-db-label').textContent = fmtDbLabel(db);
          }
        } else if (msg.type === 'error') {
          console.error('Error from server:', msg);
        }
      };
    }

    function wsSend(obj) {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
    }

    // ── Cue data ───────────────────────────────────────────────────────────────
    function requestCues() {
      if (window.opener && window.opener.postMessage) {
        window.opener.postMessage({ type: 'requestCues' }, '*');
      }
    }

    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'cueData') {
        cuesData = e.data.cues || [];
        renderCues();
      }
    });

    // ── Formatting ─────────────────────────────────────────────────────────────
    function fmtDur(s) {
      if (!s || s <= 0) return '—';
      const m = Math.floor(s / 60), sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    function fmtDb(db) {
      if (!isFinite(db) || db <= -40) return '-∞';
      return `${db >= 0 ? '+' : ''}${db.toFixed(1)}`;
    }

    function escHtml(t) {
      if (!t) return '';
      return String(t).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[c]));
    }

    // ── Render cue table ───────────────────────────────────────────────────────
    function renderCues() {
      const tbody = document.getElementById('cue-tbody');
      const empty = document.getElementById('empty-cues');
      const count = document.getElementById('cue-count');

      count.textContent = `${cuesData.length} cue${cuesData.length !== 1 ? 's' : ''}`;

      if (!cuesData.length) {
        tbody.innerHTML = '';
        empty.style.display = '';
        setSelected(-1);
        return;
      }
      empty.style.display = 'none';

      tbody.innerHTML = cuesData.map((cue, i) => {
        const isS = cue.cueType === 'sound';
        const numClass = isS ? 's' : 'l';
        const numLabel = isS ? `S${cue.number}` : `L${cue.number}`;
        let badge = '';
        if (isS) {
          const st = cue.soundType || 'play_once';
          badge = st === 'vamp'
            ? '<span class="badge vamp">Vamp</span>'
            : '<span class="badge once">Once</span>';
        } else {
          badge = '<span class="badge light">Light</span>';
        }
        const sel = i === selectedIdx ? ' selected' : '';
        const played = playedIds.has(cue.id) ? ' played' : '';
        return `<tr class="cue-row${sel}${played}" data-idx="${i}" data-id="${escHtml(cue.id)}"
        ondblclick="goSelected()" onclick="selectRow(${i})">
      <td class="col-num"><span class="cue-num ${numClass}">${numLabel}</span></td>
      <td class="cue-title-cell">${escHtml(cue.title)}</td>
      <td class="col-type">${badge}</td>
      <td class="col-len len">${isS ? fmtDur(cue.duration) : '—'}</td>
    </tr>`;
      }).join('');

      updateGoBtn();
    }

    function applyPlayedTicks() {
      document.querySelectorAll('.cue-row[data-id]').forEach(row => {
        row.classList.toggle('played', playedIds.has(row.dataset.id));
      });
    }

    // ── Selection ──────────────────────────────────────────────────────────────
    function setSelected(idx) {
      selectedIdx = idx;
      document.querySelectorAll('.cue-row').forEach((r, i) => {
        r.classList.toggle('selected', i === idx);
      });
      updateGoBtn();
      if (idx >= 0 && cuesData[idx]) {
        if (window.opener && window.opener.postMessage) {
          window.opener.postMessage({ type: 'scrollToTarget', targetId: cuesData[idx].targetId }, '*');
        }
      }
    }

    function selectRow(i) { setSelected(i); }

    function updateGoBtn() {
      const btn = document.getElementById('btn-go');
      btn.disabled = selectedIdx < 0 || selectedIdx >= cuesData.length;
    }

    // ── Keyboard nav ───────────────────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        const next = Math.min(selectedIdx + 1, cuesData.length - 1);
        setSelected(next);
        scrollRowIntoView(next);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        const prev = Math.max(selectedIdx - 1, 0);
        setSelected(prev);
        scrollRowIntoView(prev);
      } else if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        goSelected();
      }
    });

    function scrollRowIntoView(idx) {
      const row = document.querySelector(`.cue-row[data-idx="${idx}"]`);
      if (row) row.scrollIntoView({ block: 'nearest' });
    }

    // ── Cue execution ──────────────────────────────────────────────────────────
    function goSelected() {
      if (selectedIdx < 0 || selectedIdx >= cuesData.length) return;
      const cue = cuesData[selectedIdx];

      if (cue.cueType === 'sound' && cue.fullCue) {
        wsSend({ type: 'go', cueId: cue.id, cue: cue.fullCue });
      } else {
        // Lighting or non-audio: just tick it off
        wsSend({ type: 'go', cueId: cue.id });
      }

      // Advance to next cue
      const next = selectedIdx + 1;
      if (next < cuesData.length) {
        setSelected(next);
        scrollRowIntoView(next);
      }
    }

    function fadeAll() { wsSend({ type: 'fadeOutAll', duration: 2 }); }
    function stopAll() { wsSend({ type: 'stopAll' }); }
    function resetPlayed() { wsSend({ type: 'resetPlayed' }); }

    function fmtDbLabel(db) {
      if (!isFinite(db) || db <= -40) return '-∞ dB';
      return `${db >= 0 ? '+' : ''}${db.toFixed(1)} dB`;
    }

    function onMasterVol(val) {
      const db = parseFloat(val);
      document.getElementById('master-db-label').textContent = fmtDbLabel(db);
      wsSend({ type: 'masterVolume', db });
    }

    // ── Waveform cache & drawing ───────────────────────────────────────────────
    const waveCache = new Map();

    async function loadWaveform(clipUrl) {
      if (waveCache.has(clipUrl)) return waveCache.get(clipUrl);
      try {
        const res = await fetch(clipUrl);
        const ab = await res.arrayBuffer();
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        const buf = await actx.decodeAudioData(ab);
        actx.close();
        const ch = buf.getChannelData(0);
        const N = 300;
        const step = Math.floor(ch.length / N);
        const peaks = new Float32Array(N);
        for (let i = 0; i < N; i++) {
          let max = 0;
          for (let j = 0; j < step; j++) { const v = Math.abs(ch[i * step + j] || 0); if (v > max) max = v; }
          peaks[i] = max;
        }
        waveCache.set(clipUrl, peaks);
        return peaks;
      } catch (_) { return null; }
    }

    function drawWaveform(canvas, peaks, position, duration, loopStart, loopEnd, isVamp) {
      const W = canvas.offsetWidth || canvas.parentElement?.offsetWidth || 200;
      const H = 38;
      if (canvas.width !== W) canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, W, H);
      const mid = H / 2;
      if (peaks && peaks.length) {
        if (isVamp && duration > 0 && loopEnd > loopStart) {
          const lx = (loopStart / duration) * W;
          const lw = Math.max(0, ((loopEnd - loopStart) / duration) * W);
          ctx.fillStyle = 'rgba(140,90,255,0.22)';
          ctx.fillRect(lx, 0, lw, H);
          // Loop region border lines
          ctx.fillStyle = 'rgba(160,110,255,0.5)';
          ctx.fillRect(lx, 0, 1.5, H);
          ctx.fillRect(lx + lw - 1.5, 0, 1.5, H);
        }
        const bw = W / peaks.length;
        ctx.fillStyle = '#4a9edd';
        for (let i = 0; i < peaks.length; i++) {
          const h = Math.max(1, peaks[i] * mid * 1.8);
          ctx.fillRect(i * bw, mid - h, Math.max(1, bw - 0.5), h * 2);
        }
      } else {
        ctx.fillStyle = '#222234';
        ctx.fillRect(0, mid - 1, W, 2);
      }
      if (duration > 0) {
        const px = Math.round((position / duration) * W);
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.fillRect(px - 1, 0, 2, H);
        ctx.beginPath();
        ctx.moveTo(px - 4, 0); ctx.lineTo(px + 4, 0); ctx.lineTo(px, 7);
        ctx.fillStyle = '#ffffff'; ctx.fill();
      }
    }

    // ── Stable voice DOM ───────────────────────────────────────────────────────
    const voiceDomMap = new Map();
    const voicePosState = new Map();

    function updateVoices() {
      const container = document.getElementById('voices-list');
      const currentIds = new Set(activeInstances.map(i => i.instanceId));

      for (const [id, el] of voiceDomMap.entries()) {
        if (!currentIds.has(id)) { el.remove(); voiceDomMap.delete(id); voicePosState.delete(id); }
      }

      let noVoicesEl = container.querySelector('.no-voices');
      if (!activeInstances.length) {
        if (!noVoicesEl) container.innerHTML = '<div class="no-voices">No active voices</div>';
        return;
      }
      if (noVoicesEl) noVoicesEl.remove();

      activeInstances.forEach(inst => {
        const id = inst.instanceId;
        let card = voiceDomMap.get(id);
        if (!card) {
          card = buildVoiceCard(inst);
          container.appendChild(card);
          voiceDomMap.set(id, card);
          if (inst.clipUrl) {
            loadWaveform(inst.clipUrl).then(peaks => {
              if (voiceDomMap.has(id)) {
                const c = card.querySelector('.vc-wave');
                if (c) drawWaveform(c, peaks, inst.position || 0, inst.duration, inst.loopStart, inst.loopEnd, inst.isVamp);
              }
            });
          }
        }

        voicePosState.set(id, {
          serverPos: inst.position || 0, receivedAt: performance.now(),
          paused: inst.paused, duration: inst.duration || 0,
          isVamp: inst.isVamp, isDeramping: inst.isDeramping,
          loopStart: inst.loopStart || 0, loopEnd: inst.loopEnd || inst.duration || 0,
        });

        card.classList.toggle('deramping', !!inst.isDeramping);

        const playBtn = card.querySelector('.btn-vc[data-role="playpause"]');
        if (playBtn) {
          playBtn.className = `btn-vc ${inst.paused ? 'play' : 'pause'}`;
          playBtn.setAttribute('data-role', 'playpause');
          playBtn.textContent = inst.paused ? 'Play' : 'Pause';
        }

        const dvmpBtn = card.querySelector('.btn-vc[data-role="dvmp"]');
        if (dvmpBtn) dvmpBtn.style.display = (inst.isVamp && !inst.isDeramping) ? '' : 'none';
        const unvampBtn = card.querySelector('.btn-vc[data-role="unvamp"]');
        if (unvampBtn) unvampBtn.style.display = (inst.isVamp && inst.isDeramping) ? '' : 'none';

        const slider = card.querySelector('.vc-vol');
        if (slider && !slider.matches(':active') && document.activeElement !== slider) {
          const db = isFinite(inst.volume) ? inst.volume : 0;
          const clamped = Math.max(-40, Math.min(6, db));
          if (Math.abs(parseFloat(slider.value) - clamped) > 0.4) {
            slider.value = clamped;
            const lbl = card.querySelector('.vc-vol-db');
            if (lbl) lbl.textContent = fmtDb(db);
          }
        }

        const canvas = card.querySelector('.vc-wave');
        if (canvas) {
          const peaks = inst.clipUrl ? waveCache.get(inst.clipUrl) : null;
          drawWaveform(canvas, peaks, inst.position || 0, inst.duration, inst.loopStart, inst.loopEnd, inst.isVamp);
        }
      });
    }

    function buildVoiceCard(inst) {
      const id = inst.instanceId;
      const name = inst.title || (inst.clipUrl || inst.clip || '').split('/').pop();
      const db = isFinite(inst.volume) ? inst.volume : 0;
      const card = document.createElement('div');
      card.className = 'vc';
      card.dataset.iid = id;
      card.innerHTML = `
        <div class="vc-header">
          <span class="vc-name" title="${escHtml(name)}">${escHtml(name)}</span>
          <span class="vc-badge ${inst.isVamp ? 'vamp' : 'once'}">${inst.isVamp ? 'Vamp' : 'Once'}</span>
          <span class="vc-time">00:00.00</span>
        </div>
        <div class="vc-wave-wrap">
          <canvas class="vc-wave"></canvas>
          <div class="vc-fade-overlay"></div>
          <div class="vc-playhead"></div>
        </div>
        <div class="vc-controls">
          <button class="btn-vc ${inst.paused ? 'play' : 'pause'}" data-role="playpause">${inst.paused ? 'Play' : 'Pause'}</button>
          <button class="btn-vc dvmp" data-role="dvmp" style="${(inst.isVamp && !inst.isDeramping) ? '' : 'display:none'}">Dvmp</button>
          <button class="btn-vc unvamp" data-role="unvamp" style="${inst.isDeramping ? '' : 'display:none'}">Loop</button>
          <button class="btn-vc fade" data-role="fade">Fade</button>
          <button class="btn-vc stop" data-role="stop">Stop</button>
          <div class="vc-vol-group">
            <span class="vc-vol-db">${fmtDb(db)}</span>
            <input type="range" class="vc-vol" min="-40" max="6" step="0.5" value="${Math.max(-40, Math.min(6, db))}">
          </div>
        </div>`;

      card.querySelector('[data-role="playpause"]').addEventListener('click', () => {
        const btn = card.querySelector('[data-role="playpause"]');
        wsSend({ type: btn.classList.contains('pause') ? 'pause' : 'resume', instanceId: id });
      });
      card.querySelector('[data-role="dvmp"]').addEventListener('click', () => wsSend({ type: 'devamp', instanceId: id }));
      card.querySelector('[data-role="unvamp"]').addEventListener('click', () => wsSend({ type: 'cancelDevamp', instanceId: id }));
      card.querySelector('[data-role="fade"]').addEventListener('click', () => wsSend({ type: 'fadeOut', instanceId: id }));
      card.querySelector('[data-role="stop"]').addEventListener('click', () => wsSend({ type: 'stop', instanceId: id }));

      const slider = card.querySelector('.vc-vol');
      const dbLabel = card.querySelector('.vc-vol-db');
      slider.addEventListener('input', () => {
        const db = parseFloat(slider.value);
        dbLabel.textContent = fmtDb(db);
        wsSend({ type: 'setVolume', instanceId: id, db });
      });

      const waveWrap = card.querySelector('.vc-wave-wrap');
      let seeking = false;
      const doSeek = e => {
        const rect = waveWrap.getBoundingClientRect();
        const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        const st = voicePosState.get(id);
        if (!st || !st.duration) return;
        wsSend({ type: 'seek', instanceId: id, position: ratio * st.duration });
        // Update local state immediately for responsive feel
        if (st) { st.serverPos = ratio * st.duration; st.receivedAt = performance.now(); }
      };
      waveWrap.addEventListener('mousedown', e => { seeking = true; doSeek(e); e.preventDefault(); });
      document.addEventListener('mousemove', e => { if (seeking) doSeek(e); });
      document.addEventListener('mouseup', () => { seeking = false; });

      return card;
    }

    // ── RAF loop for smooth playhead ───────────────────────────────────────────
    function fmtTimecode(secs) {
      if (!isFinite(secs) || secs < 0) secs = 0;
      const m = Math.floor(secs / 60), s = Math.floor(secs % 60), cs = Math.floor((secs % 1) * 100);
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
    }

    (function rafLoop() {
      requestAnimationFrame(rafLoop);
      for (const [id, state] of voicePosState.entries()) {
        const card = voiceDomMap.get(id);
        if (!card || !state.duration) continue;
        const elapsed = state.paused ? 0 : (performance.now() - state.receivedAt) / 1000;
        let pos = state.serverPos + elapsed;

        // For vamping (not deramping), wrap position in loop region
        if (state.isVamp && !state.isDeramping && state.loopEnd > state.loopStart) {
          const { loopStart, loopEnd } = state;
          if (pos >= loopStart) {
            const loopLen = loopEnd - loopStart;
            pos = loopStart + ((pos - loopStart) % loopLen);
          }
        } else {
          pos = Math.min(pos, state.duration);
        }

        const timeEl = card.querySelector('.vc-time');
        if (timeEl) timeEl.textContent = fmtTimecode(pos);
        const ph = card.querySelector('.vc-playhead');
        if (ph) ph.style.left = ((pos / state.duration) * 100).toFixed(3) + '%';
      }
    })();

    // ── Resizer ────────────────────────────────────────────────────────────────
    (function () {
      const resizer = document.getElementById('resizer');
      const paneTop = document.getElementById('pane-top');
      let startY = 0, startH = 0;

      resizer.addEventListener('mousedown', (e) => {
        startY = e.clientY;
        startH = paneTop.offsetHeight;
        resizer.classList.add('dragging');
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', onUp);
        e.preventDefault();
      });

      function onDrag(e) {
        const dy = e.clientY - startY;
        const newH = Math.max(60, Math.min(window.innerHeight - 120, startH + dy));
        paneTop.style.height = newH + 'px';
      }
      function onUp() {
        resizer.classList.remove('dragging');
        document.removeEventListener('mousemove', onDrag);
        document.removeEventListener('mouseup', onUp);
      }
    })();

    // ── Init ───────────────────────────────────────────────────────────────────
    connectWS();
    requestCues();
  </script>
</body>

</html>
